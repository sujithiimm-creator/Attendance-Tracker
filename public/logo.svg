<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#4f46e5" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Smooth background rounded area -->
  <rect width="512" height="512" rx="144" fill="#1e1b4b" />
  
  <!-- Glowing subtle circular ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-dasharray="12 12" opacity="0.4" />
  
  <!-- The main AttendTrack symbol -->
  <g filter="url(#shadow)">
    <!-- Elegant Arch / 'A' bar -->
    <path d="M 160 360 L 256 160 L 305 262" fill="none" stroke="url(#grad1)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Dynamic Checkmark -->
    <path d="M 220 310 L 260 360 L 380 180" fill="none" stroke="#10b981" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Accent mark -->
  <circle cx="256" cy="160" r="14" fill="#ffffff" />
</svg>
